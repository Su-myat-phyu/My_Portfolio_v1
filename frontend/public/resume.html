<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Su Myat Phyu - Resume</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #f7eeee;
        color: #222;
        font-family: Arial, sans-serif;
      }

      .resume-viewer {
        min-height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .resume-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 18px;
        background: #fff;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .resume-bar h1 {
        margin: 0;
        font-size: 1rem;
      }

      .resume-bar a {
        color: #222;
        font-weight: 700;
        text-decoration: none;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="resume-viewer">
      <header class="resume-bar">
        <h1>Su Myat Phyu - Resume</h1>
        <a href="/assets/su_myat_phyu_resume_enhanced.pdf" download>Download PDF</a>
      </header>
      <iframe
        src="/assets/su_myat_phyu_resume_enhanced.pdf#toolbar=1&navpanes=0"
        title="Su Myat Phyu resume PDF"
      ></iframe>
    </main>
  </body>
</html>
